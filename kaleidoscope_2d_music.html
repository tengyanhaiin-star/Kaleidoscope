<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaleidoscope</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            min-height: 100vh; background: #000;
            font-family: 'Inter', sans-serif; padding: 16px;
        }
        .title { margin-bottom: 12px; text-align: center; }
        h1 { font-size: 1.8rem; font-weight: bold; color: white; }
        .header { margin-bottom: 16px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        button {
            padding: 10px 16px; color: white; border: none;
            border-radius: 8px; cursor: pointer; font-size: 15px;
        }
        button:hover { filter: brightness(1.2); }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            filter: none;
        }
        #btnNew    { background: linear-gradient(to right, #9333ea, #db2777); }
        #btnMove   { background: #16a34a; }
        #btnRotate { background: #0369a1; }
        #btnLoadAudio { background: #8b5cf6; }
        #btnPlayPause { background: #6366f1; }
        #selectSize {
            padding: 10px 12px; font-size: 14px; color: white;
            background: #1e3a5f; border: 2px solid #38bdf8;
            border-radius: 8px; cursor: pointer; outline: none;
        }
        #selectSize option { background: #111827; }
        .audio-controls {
            display: flex; gap: 8px; align-items: center;
        }
        #volumeSlider {
            width: 80px; height: 6px; border-radius: 3px;
            background: #374151; outline: none;
            appearance: none; cursor: pointer;
        }
        #volumeSlider:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        #volumeSlider::-webkit-slider-thumb {
            appearance: none; width: 14px; height: 14px;
            border-radius: 50%; background: #38bdf8;
            cursor: pointer;
        }
        #volumeSlider:disabled::-webkit-slider-thumb {
            background: #6b7280;
            cursor: not-allowed;
        }
        #volumeSlider::-moz-range-thumb {
            width: 14px; height: 14px; border: none;
            border-radius: 50%; background: #38bdf8;
            cursor: pointer;
        }
        #volumeSlider:disabled::-moz-range-thumb {
            background: #6b7280;
            cursor: not-allowed;
        }
        #fileAudio { display: none; }
        #loadingStatus {
            font-size: 12px;
            color: #38bdf8;
            display: none;
        }
        .canvas-container {
            border: 4px solid #a855f7; border-radius: 8px;
            overflow: hidden; width: 100%; max-width: 1600px;
            max-height: calc(100vh - 200px);
        }
        canvas { display: block; width: 100%; height: auto; max-height: 100%; }
    </style>
</head>
<body>
    <div class="title">
        <h1>Triangular Tessellation Kaleidoscope</h1>
    </div>
    <div class="header">
        <button id="btnNew"    onclick="generateNewPattern()">🔀 Reset</button>
        <button id="btnMove"   onclick="toggleMove()">▶ Start Motion</button>
        <button id="btnRotate" onclick="toggleRotate()">🔄 Start Rotation</button>
        <select id="selectSize" onchange="setParticleSize(this.value)">
            <option value="giant" selected>⬛ Giant</option>
            <option value="large">◆ Large</option>
            <option value="medium">◈ Medium</option>
            <option value="small">◇ Small</option>
            <option value="micro">· Micro</option>
        </select>
        <div class="audio-controls">
            <input type="file" id="fileAudio" accept="audio/*" onchange="loadAudio(this)">
            <button id="btnLoadAudio" onclick="document.getElementById('fileAudio').click()">📁 Load Music</button>
            <button id="btnPlayPause" onclick="toggleAudio()" disabled>▶ Play</button>
            <input type="range" id="volumeSlider" min="0" max="100" value="50" oninput="setVolume(this.value)" disabled>
            <span id="loadingStatus">Loading...</span>
        </div>
    </div>
    <div class="canvas-container">
        <canvas id="main" width="1600" height="900"></canvas>
    </div>

<script>
const mainCanvas = document.getElementById('main');
const ctx = mainCanvas.getContext('2d');
const W = mainCanvas.width, H = mainCanvas.height;

const TRI_SIZE = 100;
const TRI_H = TRI_SIZE * Math.sqrt(3) / 2;

const SHAPE_SIDE_GIANT  = TRI_SIZE / 2;
const SHAPE_SIDE_LARGE  = TRI_SIZE / 4;
const SHAPE_SIDE_MEDIUM = TRI_SIZE / 6;
const SHAPE_SIDE_SMALL  = TRI_SIZE / 8;
const SHAPE_SIDE_MICRO  = TRI_SIZE / 10;

let particleSizeMode = 'giant';

const srcCanvas = document.createElement('canvas');
srcCanvas.width = srcCanvas.height = TRI_SIZE * 3;
const srcCtx = srcCanvas.getContext('2d');
const SC = srcCanvas.width / 2;

const offCanvas = document.createElement('canvas');
// offCanvas only needs to cover the circular area the visible rect can sweep
// through while rotating — no need to make it as large as 2W×2H
// (saves a lot of pixels and triangles).
// Half-diagonal = max distance from center to a corner while rotating,
// *1.05 leaves a small safety margin.
const OFF_SIZE = Math.ceil(2 * Math.sqrt((W / 2) ** 2 + (H / 2) ** 2) * 1.05);
offCanvas.width = OFF_SIZE; offCanvas.height = OFF_SIZE;
const offCtx = offCanvas.getContext('2d');

const colorList = [
    '#FF9999','#66CCCC','#99CCFF','#FFAA88','#88DDBB','#FFD666',
    '#CC99FF','#99DDFF','#FFBB66','#66CCAA','#FF99CC','#99BBFF',
    '#FFB366','#FF6699','#AA99FF','#66AAFF','#66DDAA','#FFD699',
    '#FF8899','#66BBAA','#DD99CC','#99DDAA','#FFAA99','#99AAFF'
];

const bgColorList = [
    '#E8DED2','#D9E1E8','#E5D9E8','#D9E8E1','#E8E1D9','#DED9E8',
    '#E1E8D9','#E8D9E1','#D2E8DE','#DED2E8','#E8DED2','#D9DEE8'
];

let backgroundColor = '#F2F3F5';

const rndColor = () => colorList[Math.floor(Math.random() * colorList.length)];

function circumRadius(sides, sideLen) {
    return sideLen / (2 * Math.sin(Math.PI / sides));
}

const SHAPE_DEFS = [3, 4, 5, 6];

let particles = [];
let triList   = [];
let moving    = false, rotating = false;
let rafId     = null, angle = 0;

function generateParticles() {
    particles = [];
    const mode = particleSizeMode;
    const sideLen = mode === 'giant'  ? SHAPE_SIDE_GIANT
                  : mode === 'large'  ? SHAPE_SIDE_LARGE
                  : mode === 'medium' ? SHAPE_SIDE_MEDIUM
                  : mode === 'small'  ? SHAPE_SIDE_SMALL
                  : SHAPE_SIDE_MICRO;
    const count = mode === 'giant'  ? 1
                : mode === 'large'  ? 4
                : mode === 'medium' ? 9
                : mode === 'small'  ? 16
                : 25;

    backgroundColor = bgColorList[Math.floor(Math.random() * bgColorList.length)];
    const usedColors = new Set([backgroundColor]);

    for (let si = 0; si < SHAPE_DEFS.length; si++) {
        const sides = SHAPE_DEFS[si];
        const radius = circumRadius(sides, sideLen);
        for (let i = 0; i < count; i++) {
            const a = Math.random() * Math.PI * 2, d = Math.random() * 38;
            
            let color;
            let attempts = 0;
            do {
                color = rndColor();
                attempts++;
            } while (usedColors.has(color) && attempts < 50);
            usedColors.add(color);
            
            particles.push({
                x: Math.cos(a) * d, y: Math.sin(a) * d,
                baseVx: (Math.random() - 0.5) * 0.25, 
                baseVy: (Math.random() - 0.5) * 0.25,
                vx: (Math.random() - 0.5) * 0.25, 
                vy: (Math.random() - 0.5) * 0.25,
                sides, radius,
                color: color, rot: Math.random() * Math.PI * 2,
                rotSpd: (Math.random() - 0.5) * 0.012,
                colorTimer: Math.floor(Math.random() * 400),
                colorInterval: 280 + Math.floor(Math.random() * 320)
            });
        }
    }
}

function updateParticles() {
    const intensity = getAudioIntensity();
    const speedMultiplier = 0.5 + intensity * 1.5;
    
    for (const p of particles) {
        p.vx = p.baseVx * speedMultiplier;
        p.vy = p.baseVy * speedMultiplier;
        
        p.x += p.vx; p.y += p.vy; p.rot += p.rotSpd;
        const dist = Math.hypot(p.x, p.y);
        if (dist > 44) {
            const nx = p.x / dist, ny = p.y / dist;
            const dot = p.vx * nx + p.vy * ny;
            p.vx -= 2 * dot * nx; p.vy -= 2 * dot * ny;
            p.baseVx = p.vx / speedMultiplier;
            p.baseVy = p.vy / speedMultiplier;
            p.x = nx * 44; p.y = ny * 44;
        }
        
        const colorSpeedMultiplier = 0.3 + intensity * 1.7;
        p.colorTimer += colorSpeedMultiplier;
        if (p.colorTimer >= p.colorInterval) {
            p.color = rndColor(); 
            p.colorTimer = 0;
            p.colorInterval = 280 + Math.floor(Math.random() * 320);
        }
    }
}

function renderSrc() {
    srcCtx.fillStyle = backgroundColor;
    srcCtx.fillRect(0, 0, srcCanvas.width, srcCanvas.height);
    
    const intensity = getAudioIntensity();
    const scaleMultiplier = 0.85 + intensity * 0.4;
    
    for (const p of particles) {
        srcCtx.save();
        srcCtx.translate(SC + p.x, SC + p.y);
        srcCtx.rotate(p.rot);
        srcCtx.scale(scaleMultiplier, scaleMultiplier);
        srcCtx.globalAlpha = 0.5;
        
        const gradient = srcCtx.createRadialGradient(0, 0, 0, 0, 0, p.radius);
        gradient.addColorStop(0, p.color);
        gradient.addColorStop(1, adjustBrightness(p.color, 0.3));
        
        srcCtx.fillStyle = gradient;
        srcCtx.beginPath();
        for (let i = 0; i < p.sides; i++) {
            const a = (i / p.sides) * Math.PI * 2 - Math.PI / 2;
            i === 0
                ? srcCtx.moveTo(Math.cos(a) * p.radius, Math.sin(a) * p.radius)
                : srcCtx.lineTo(Math.cos(a) * p.radius, Math.sin(a) * p.radius);
        }
        srcCtx.closePath();
        srcCtx.fill();
        srcCtx.restore();
    }
}

function adjustBrightness(hexColor, factor) {
    const r = parseInt(hexColor.slice(1, 3), 16);
    const g = parseInt(hexColor.slice(3, 5), 16);
    const b = parseInt(hexColor.slice(5, 7), 16);
    
    const newR = Math.round(r * factor);
    const newG = Math.round(g * factor);
    const newB = Math.round(b * factor);
    
    return `#${newR.toString(16).padStart(2, '0')}${newG.toString(16).padStart(2, '0')}${newB.toString(16).padStart(2, '0')}`;
}

function reflectPoint(px, py, x1, y1, x2, y2) {
    const dx = x2 - x1, dy = y2 - y1;
    const t = ((px - x1) * dx + (py - y1) * dy) / (dx * dx + dy * dy);
    return { x: 2 * (x1 + t * dx) - px, y: 2 * (y1 + t * dy) - py };
}

function buildTriList() {
    triList = [];
    // Tile the grid to match offCanvas's actual size directly — no need to
    // over-provision based on the old 2W×2H assumption.
    const ox = offCanvas.width / 2, oy = offCanvas.height / 2;
    const rows = Math.ceil(oy / TRI_H) + 3;
    const cols = Math.ceil(ox / TRI_SIZE) + 3;

    const triMap = new Map();

    for (let row = -rows; row <= rows; row++) {
        const offX = (((row % 2) + 2) % 2) * (TRI_SIZE / 2);
        for (let col = -cols; col <= cols; col++) {
            const bx = ox + col * TRI_SIZE + offX;
            const by = oy + row * TRI_H;
            const top = by - TRI_H * 2 / 3;
            const bot = by + TRI_H / 3;

            const up = {
                id: `U${row}_${col}`,
                v: [{ x: bx, y: top }, { x: bx + TRI_SIZE/2, y: bot }, { x: bx - TRI_SIZE/2, y: bot }],
                xform: null, neighbors: []
            };
            const dn = {
                id: `D${row}_${col}`,
                v: [{ x: bx + TRI_SIZE/2, y: bot }, { x: bx, y: top }, { x: bx + TRI_SIZE, y: top }],
                xform: null, neighbors: []
            };
            triMap.set(up.id, up);
            triMap.set(dn.id, dn);
        }
    }

    const edgeMap = new Map();
    for (const tri of triMap.values()) {
        for (let i = 0; i < 3; i++) {
            const a = tri.v[i], b = tri.v[(i+1)%3];
            const kfwd = `${a.x.toFixed(1)},${a.y.toFixed(1)}|${b.x.toFixed(1)},${b.y.toFixed(1)}`;
            if (!edgeMap.has(kfwd)) edgeMap.set(kfwd, []);
            edgeMap.get(kfwd).push({ tri, edgeIdx: i });
        }
    }
    for (const tri of triMap.values()) {
        for (let i = 0; i < 3; i++) {
            const a = tri.v[i], b = tri.v[(i+1)%3];
            const krev = `${b.x.toFixed(1)},${b.y.toFixed(1)}|${a.x.toFixed(1)},${a.y.toFixed(1)}`;
            const matches = edgeMap.get(krev);
            if (matches && matches.length > 0) {
                tri.neighbors[i] = matches[0].tri;
            }
        }
    }

    let seed = null, minD = Infinity;
    for (const tri of triMap.values()) {
        if (!tri.id.startsWith('U')) continue;
        const gx = (tri.v[0].x + tri.v[1].x + tri.v[2].x) / 3;
        const gy = (tri.v[0].y + tri.v[1].y + tri.v[2].y) / 3;
        const d = (gx - ox) ** 2 + (gy - oy) ** 2;
        if (d < minD) { minD = d; seed = tri; }
    }

    const sgx = (seed.v[0].x + seed.v[1].x + seed.v[2].x) / 3;
    const sgy = (seed.v[0].y + seed.v[1].y + seed.v[2].y) / 3;
    seed.xform = new DOMMatrix([1, 0, 0, 1, sgx - SC, sgy - SC]);

    const queue = [seed];
    const visited = new Set([seed.id]);

    while (queue.length) {
        const cur = queue.shift();

        for (let i = 0; i < 3; i++) {
            const nb = cur.neighbors[i];
            if (!nb || visited.has(nb.id)) continue;
            visited.add(nb.id);

            const ea = cur.v[i];
            const eb = cur.v[(i+1)%3];

            const dx = eb.x - ea.x, dy = eb.y - ea.y;
            const len2 = dx*dx + dy*dy;
            const a2 =  (dx*dx - dy*dy) / len2;
            const b2 =  2*dx*dy / len2;
            const tx = ea.x*(1-a2) - ea.y*b2;
            const ty = ea.y*(1+a2) - ea.x*b2;

            const M = new DOMMatrix([a2, b2, b2, -a2, tx, ty]);
            nb.xform = M.multiply(cur.xform);

            queue.push(nb);
        }
    }

    for (const tri of triMap.values()) {
        if (tri.xform) triList.push(tri);
    }
}

function renderOffscreen() {
    offCtx.fillStyle = backgroundColor;
    offCtx.fillRect(0, 0, offCanvas.width, offCanvas.height);

    for (const tri of triList) {
        offCtx.save();

        offCtx.beginPath();
        offCtx.moveTo(tri.v[0].x, tri.v[0].y);
        offCtx.lineTo(tri.v[1].x, tri.v[1].y);
        offCtx.lineTo(tri.v[2].x, tri.v[2].y);
        offCtx.closePath();
        offCtx.clip();

        const m = tri.xform;
        offCtx.setTransform(m.a, m.b, m.c, m.d, m.e, m.f);
        offCtx.drawImage(srcCanvas, 0, 0);

        offCtx.restore();
    }
}

function render() {
    ctx.fillStyle = backgroundColor;
    ctx.fillRect(0, 0, W, H);
    ctx.save();
    ctx.translate(W/2, H/2);
    ctx.rotate(angle);
    ctx.drawImage(offCanvas, -offCanvas.width/2, -offCanvas.height/2);
    ctx.restore();
}

function loop() {
    if (moving) { updateParticles(); renderSrc(); renderOffscreen(); }
    
    if (rotating) {
        const intensity = getAudioIntensity();
        const rotationMultiplier = 0.5 + intensity * 2.0;
        angle += 0.0015 * rotationMultiplier;
    }
    
    render();
    rafId = requestAnimationFrame(loop);
}

function ensureLoop() { if (!rafId) rafId = requestAnimationFrame(loop); }
function tryStop() { if (!moving && !rotating) { cancelAnimationFrame(rafId); rafId = null; } }

function toggleMove() {
    moving = !moving;
    const b = document.getElementById('btnMove');
    b.textContent = moving ? '⏸ Pause Motion' : '▶ Start Motion';
    b.style.background = moving ? '#dc2626' : '#16a34a';
    moving ? ensureLoop() : tryStop();
}
function toggleRotate() {
    rotating = !rotating;
    const b = document.getElementById('btnRotate');
    b.textContent = rotating ? '⏸ Pause Rotation' : '🔄 Start Rotation';
    b.style.background = rotating ? '#dc2626' : '#0369a1';
    rotating ? ensureLoop() : tryStop();
}
function setParticleSize(mode) {
    if (particleSizeMode === mode) return;
    particleSizeMode = mode;
    generateParticles();
    renderSrc();
    renderOffscreen();
    render();
}

// ── Music Controls ─────────────────────────────────
let audioContext = null;
let audioSource = null;
let gainNode = null;
let analyserNode = null;
let audioBuffer = null;
let isPlaying = false;
let audioData = null;
let audioStartTime = 0;
let audioPauseTime = 0;

function initAudioContext() {
    if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        gainNode = audioContext.createGain();
        gainNode.gain.value = 0.5;
        
        analyserNode = audioContext.createAnalyser();
        analyserNode.fftSize = 256;
        audioData = new Uint8Array(analyserNode.frequencyBinCount);
        
        gainNode.connect(audioContext.destination);
    }
}

function toggleAudio() {
    if (!audioBuffer) return;
    
    const btn = document.getElementById('btnPlayPause');
    if (isPlaying) {
        stopAudio();
        btn.textContent = '▶ Play';
        btn.style.background = '#6366f1';
    } else {
        playAudio();
        btn.textContent = '⏸ Pause';
        btn.style.background = '#dc2626';
    }
}

function loadAudio(input) {
    const file = input.files[0];
    if (!file) return;
    
    // If currently playing, pause first
    if (isPlaying) {
        stopAudio();
        const btn = document.getElementById('btnPlayPause');
        btn.textContent = '▶ Play';
        btn.style.background = '#6366f1';
    }
    
    // Show loading status, disable controls
    document.getElementById('loadingStatus').style.display = 'inline';
    document.getElementById('btnPlayPause').disabled = true;
    document.getElementById('volumeSlider').disabled = true;
    
    initAudioContext();
    
    const reader = new FileReader();
    reader.onload = function(e) {
        audioContext.decodeAudioData(e.target.result, function(buffer) {
            audioBuffer = buffer;
            audioPauseTime = 0;
            
            // Hide loading status, enable controls
            document.getElementById('loadingStatus').style.display = 'none';
            document.getElementById('btnPlayPause').disabled = false;
            document.getElementById('volumeSlider').disabled = false;
            
            // Auto-play the new music
            playAudio();
            const btnPlay = document.getElementById('btnPlayPause');
            btnPlay.textContent = '⏸ Pause';
            btnPlay.style.background = '#dc2626';
        }, function(error) {
            console.error('Audio decode failed:', error);
            alert('Unable to load this audio file. Please choose another file.');
            
            // Hide loading status
            document.getElementById('loadingStatus').style.display = 'none';
        });
    };
    
    reader.onerror = function() {
        console.error('File read failed');
        alert('File read failed');
        document.getElementById('loadingStatus').style.display = 'none';
    };
    
    reader.readAsArrayBuffer(file);
}

function playAudio() {
    if (!audioBuffer || isPlaying) return;
    
    initAudioContext();
    
    if (audioSource) {
        audioSource.stop();
    }
    
    audioSource = audioContext.createBufferSource();
    audioSource.buffer = audioBuffer;
    audioSource.loop = true;
    
    audioSource.connect(analyserNode);
    analyserNode.connect(gainNode);
    
    audioStartTime = audioContext.currentTime - audioPauseTime;
    audioSource.start(0, audioPauseTime);
    
    isPlaying = true;
}

function stopAudio() {
    if (audioSource && isPlaying) {
        const elapsed = audioContext.currentTime - audioStartTime;
        audioPauseTime = elapsed % audioBuffer.duration;
        
        audioSource.stop();
        audioSource = null;
        isPlaying = false;
    }
}

function setVolume(val) {
    if (gainNode && audioBuffer) {
        gainNode.gain.value = val / 100;
    }
}

function getAudioIntensity() {
    if (!analyserNode || !isPlaying || !audioData) return 0;
    
    analyserNode.getByteFrequencyData(audioData);
    
    let sum = 0;
    for (let i = 0; i < audioData.length; i++) {
        sum += audioData[i];
    }
    const average = sum / audioData.length;
    
    return Math.min(1, average / 128);
}

function generateNewPattern() {
    if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
    moving = rotating = false; angle = 0;
    document.getElementById('btnMove').textContent = '▶ Start Motion';
    document.getElementById('btnMove').style.background = '#16a34a';
    document.getElementById('btnRotate').textContent = '🔄 Start Rotation';
    document.getElementById('btnRotate').style.background = '#0369a1';
    generateParticles();
    buildTriList();
    renderSrc();
    renderOffscreen();
    render();
}

generateNewPattern();
</script>
</body>
</html>
